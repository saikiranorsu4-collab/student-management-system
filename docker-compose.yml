services:
  backend:
    build: ./student-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/studentdb
      - JWT_SECRET=mysecretkey
    depends_on:
      - mongo

  frontend:
    build: ./student-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  mongo:
    image: mongo
    ports:
      - "27017:27017"